<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Print – T-NGON Label</title>
  <link rel="stylesheet" href="./assets/css/app.css"/>
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">T-NGON • Print</div>
    <div class="kv"><span>Phase 1: Preview/PNG (chưa cần Hub)</span></div>
  </header>

  <main class="grid2">
    <section class="panel">
      <h2>Thông tin sản phẩm</h2>

      <div class="formGrid">
        <label>Base code <input id="baseCode" value="123456"></label>
        <label>Name <input id="name" value="Thịt bò"></label>
        <label>Price/kg <input id="pricePerKg" type="number" value="10000"></label>
        <label>Min (g) <input id="minGram" type="number" value="500"></label>
        <label>Max (g) <input id="maxGram" type="number" value="2000"></label>
        <label>Step (g) <input id="stepGram" type="number" value="50"></label>

        <label>Indo <input id="indo" value="Daging sapi"></label>
        <label>Myanma <input id="myanma" value=""></label>
        <label>Japan <input id="japan" value="牛肉"></label>
        <label>English <input id="english" value="Beef"></label>
      </div>

      <div class="toolrow">
        <button id="btnGenerate">Generate</button>
      </div>

      <div id="status" class="status ok">Ready.</div>
    </section>

    <section class="panel">
      <h2>Nút in (kèm 👁 Preview)</h2>
      <div id="grid" class="btnGrid"></div>

      <div class="hr"></div>

      <h2>Preview</h2>
      <div class="previewScene">
        <div class="previewTable">
          <div class="stickerWrap">
            <img id="previewImg" class="sticker" alt="preview"/>
            <div class="stickerGloss"></div>
          </div>
        </div>
      </div>
      <div class="toolrow">
        <span id="previewInfo" class="muted"></span>
      </div>
    </section>
  </main>

  <script type="module" src="./assets/js/print.js"></script>

  <style>
    .btnGrid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap:10px;
      margin-top:10px;
    }
    .cardBtn{
      border:1px solid var(--border);
      background: rgba(255,255,255,0.04);
      padding:10px;
      border-radius:14px;
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }
    .cardBtn .meta{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .cardBtn b{ font-size:14px; }
    .cardBtn small{ color: var(--muted); }
  </style>
</body>
</html>
