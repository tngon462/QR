<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Print – T-NGON Label</title>

  <link rel="stylesheet" href="./assets/css/app.css" />

  <!-- Konva + JsBarcode -->
  <script src="https://cdn.jsdelivr.net/npm/konva@9.3.16/konva.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">IN</div>
    <div>
      <div class="title">T-NGON Label Print</div>
      <div class="sub">Phase 1: test preview image • Chưa cần máy in</div>
    </div>
  </div>
  <div class="badges">
    <span class="badge status" id="status">Ready</span>
  </div>
</header>

<main class="layout print-layout">
  <section class="panel">
    <div class="panel-head">
      <div class="panel-title">Thông số</div>
    </div>

    <div class="form-grid">
      <div>
        <label class="lbl">Base code</label>
        <input class="input" id="baseCode" value="123456" />
      </div>
      <div>
        <label class="lbl">Name</label>
        <input class="input" id="name" value="Thịt bò" />
      </div>
      <div>
        <label class="lbl">Price / 1kg</label>
        <input class="input" id="pricePerKg" type="number" value="10000" />
      </div>
      <div>
        <label class="lbl">Min (g)</label>
        <input class="input" id="minGram" type="number" value="500" />
      </div>
      <div>
        <label class="lbl">Max (g)</label>
        <input class="input" id="maxGram" type="number" value="2000" />
      </div>
      <div>
        <label class="lbl">Step (g)</label>
        <input class="input" id="stepGram" type="number" value="50" />
      </div>

      <div>
        <label class="lbl">Indo</label>
        <input class="input" id="indo" placeholder="Indonesia..." />
      </div>
      <div>
        <label class="lbl">Myanma</label>
        <input class="input" id="myanma" placeholder="Myanmar..." />
      </div>
      <div>
        <label class="lbl">Japan</label>
        <input class="input" id="japan" placeholder="日本語..." />
      </div>
      <div>
        <label class="lbl">English</label>
        <input class="input" id="english" placeholder="English..." />
      </div>
    </div>

    <div class="tool-row">
      <button class="btn" id="btnGenerate">Generate</button>
      <button class="btn" id="btnOpenDesigner" onclick="location.href='./designer.html'">Open Designer</button>
    </div>

    <div class="hint">
      Mỗi mức cân sẽ có: <b>IN</b> (để sau nối hub) + <b>👁</b> xem trước ảnh tem sẽ in.
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <div class="panel-title">Danh sách nút</div>
    </div>
    <div id="grid" class="btn-grid"></div>
  </section>
</main>

<!-- Preview modal -->
<div id="modal" class="modal" style="display:none">
  <div class="modal-backdrop" id="modalClose"></div>
  <div class="modal-card">
    <div class="modal-head">
      <div id="modalTitle" class="modal-title">Preview</div>
      <button class="btn" id="modalX">Close</button>
    </div>
    <div class="modal-body">
      <img id="modalImg" alt="label preview" style="max-width:100%; height:auto; border-radius:12px;" />
    </div>
  </div>
</div>

<script type="module" src="./assets/js/print.js"></script>
</body>
</html>
