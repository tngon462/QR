<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Print – T-NGON Label</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <nav>
    <a href="./index.html">Home</a>
    <a href="./designer.html">Designer</a>
    <a href="./print.html">Print</a>
    <a href="./settings.html">Settings</a>
  </nav>

  <div class="container">
    <div class="card">
      <h2 style="margin:0 0 6px 0;">Print (Vận hành)</h2>
      <div class="smallNote">
        Nhân viên cân → bấm nút tương ứng → gửi job in về Hub.
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="row">
        <label>baseCode<br><input id="baseCode" placeholder="123456"></label>
        <label>name<br><input id="name" placeholder="Thịt bò"></label>
        <label>pricePerKg<br><input id="pricePerKg" type="number" placeholder="10000"></label>
        <label>minGram<br><input id="minGram" type="number" placeholder="500"></label>
        <label>maxGram<br><input id="maxGram" type="number" placeholder="2000"></label>
        <label>stepGram<br><input id="stepGram" type="number" placeholder="50"></label>
        <button id="btnGenerate">Generate</button>
      </div>

      <div id="status" class="status"></div>

      <div style="margin-top:14px;">
        <div class="weight-grid" id="grid"></div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div style="font-weight:800;margin-bottom:8px;">Last render preview</div>
      <img id="lastPreview" src="" alt="last preview" style="max-width:420px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#0a0c10;">
    </div>

  </div>

  <script type="module" src="./assets/js/print.js"></script>
</body>
</html>
