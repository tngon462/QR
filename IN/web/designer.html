<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Designer – T-NGON Label</title>
  <link rel="stylesheet" href="./assets/css/app.css"/>

  <!-- Konva -->
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="./index.html">Home</a>
      <a class="active" href="./designer.html">Designer</a>
      <a href="./print.html">Print</a>
      <a href="./settings.html">Settings</a>
    </div>

    <div class="card">
      <h2 style="margin:0 0 10px">Designer (Kéo-thả tem)</h2>
      <div class="small">Tip: double-click Text để sửa nhanh. “Save Template” để lưu vào localStorage.</div>

      <hr/>

      <div class="row">
        <div class="col">
          <label>Label size</label>
          <div class="kv">
            <span id="lblSize"></span>
            <span id="lblDpi"></span>
          </div>

          <label>Toolbox</label>
          <div class="kv">
            <button id="btnAddText">+ Text</button>
            <button id="btnAddPrice">+ Giá ({{amount}})</button>
            <button id="btnAddWeight">+ Khối lượng ({{weight_kg}})</button>
            <button id="btnAddBarcode">+ Barcode (CODE128)</button>
            <button class="danger" id="btnDelete">Delete Selected</button>
          </div>

          <label>Selected Node (quick edit)</label>
          <textarea id="txtProps" placeholder="Chọn 1 node rồi xem/sửa JSON attrs đơn giản..."></textarea>
          <div class="kv">
            <button id="btnApplyProps">Apply</button>
            <button id="btnBringFront">Bring Front</button>
            <button id="btnSendBack">Send Back</button>
          </div>

          <label>Template JSON</label>
          <textarea id="txtTemplate" placeholder="stage JSON..."></textarea>
          <div class="kv">
            <button class="primary" id="btnSave">Save Template</button>
            <button id="btnLoad">Load From Box</button>
            <button id="btnReset">Reset Sample</button>
          </div>

          <div id="status" class="notice small" style="margin-top:10px"></div>
        </div>

        <div class="col">
          <label>Canvas</label>
          <div class="canvasWrap">
            <div id="stage"></div>
          </div>
          <div class="small" style="margin-top:8px">
            Biến gợi ý: {{name}}, {{amount}}, {{weight_g}}, {{weight_kg}}, {{barcode}}
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./assets/js/designer.js"></script>
</body>
</html>
