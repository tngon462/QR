<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Designer – T-NGON Label</title>
  <link rel="stylesheet" href="./assets/css/app.css"/>
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">T-NGON • Label Designer</div>
    <div class="kv">
      <span>Size: <b id="lblSize"></b></span>
      <span>DPI: <b id="lblDpi"></b></span>
    </div>
  </header>

  <main class="grid2">
    <!-- LEFT -->
    <section class="panel">
      <h2>Toolbox</h2>

      <div class="toolrow">
        <button id="btnAddText">+ Text</button>
        <button id="btnAddPrice">+ Price</button>
        <button id="btnAddWeight">+ Weight</button>
        <button id="btnAddBarcode">+ Barcode</button>
      </div>

      <div class="toolrow">
        <button id="btnAddName">+ name</button>
        <button id="btnAddIndo">+ indo</button>
        <button id="btnAddMyanma">+ myanma</button>
        <button id="btnAddJapan">+ japan</button>
        <button id="btnAddEnglish">+ english</button>
      </div>

      <div class="hr"></div>

      <h3>Label size</h3>
      <div class="row">
        <select id="sizePreset">
          <option value="50x30@203">50×30mm @203</option>
          <option value="40x30@203">40×30mm @203</option>
          <option value="60x40@203">60×40mm @203</option>
          <option value="50x30@300">50×30mm @300</option>
          <option value="custom">Custom…</option>
        </select>
      </div>

      <div id="customSizeBox" class="row" style="display:none">
        <input id="wmm" type="number" step="1" placeholder="Width mm"/>
        <input id="hmm" type="number" step="1" placeholder="Height mm"/>
        <input id="dpi" type="number" step="1" placeholder="DPI"/>
        <div class="toolrow">
          <button id="btnApplySize">Apply (no scale)</button>
          <button id="btnScaleToNew">Apply + scale</button>
        </div>
      </div>

      <div class="hr"></div>

      <h3>Canvas</h3>
      <div class="toolrow">
        <button id="btnDelete">Delete</button>
        <button id="btnBringFront">Bring front</button>
        <button id="btnSendBack">Send back</button>
      </div>

      <div class="row">
        <textarea id="txtProps" class="ta" placeholder="Attrs JSON (advanced)"></textarea>
      </div>
      <div class="toolrow">
        <button id="btnApplyProps">Apply attrs</button>
      </div>

      <div class="hr"></div>

      <h3>Template JSON</h3>
      <textarea id="txtTemplate" class="ta" placeholder="Template JSON..."></textarea>
      <div class="toolrow">
        <button id="btnSave">Save</button>
        <button id="btnLoad">Load</button>
        <button id="btnReset">Reset sample</button>
      </div>

      <div id="status" class="status ok">Ready.</div>
    </section>

    <!-- RIGHT -->
    <section class="panel">
      <h2>Thiết kế (kéo-thả trên khung)</h2>
      <div class="stageWrap">
        <div id="stage"></div>
      </div>

      <div class="hr"></div>

      <h2>Dữ liệu xem trước</h2>
      <div class="formGrid">
        <label>Name <input id="pv_name" placeholder="vd: Thịt bò"/></label>
        <label>Base code <input id="pv_base" placeholder="123456"/></label>
        <label>Grams <input id="pv_grams" type="number" step="1"/></label>
        <label>Price/kg <input id="pv_price" type="number" step="10"/></label>

        <label>Indo <input id="pv_indo" placeholder=""/></label>
        <label>Myanma <input id="pv_myanma" placeholder=""/></label>
        <label>Japan <input id="pv_japan" placeholder=""/></label>
        <label>English <input id="pv_english" placeholder=""/></label>
      </div>

      <div class="toolrow">
        <button id="btnPreview">Refresh preview</button>
        <span id="previewInfo" class="muted"></span>
      </div>

      <div class="previewScene">
        <div class="previewTable">
          <div class="stickerWrap">
            <img id="previewImg" class="sticker" alt="preview"/>
            <div class="stickerGloss"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./assets/js/designer.js"></script>
</body>
</html>
