<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <meta name="theme-color" content="#ffffff" />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  />

  <title>T-NGON - In tem hàng hóa</title>

  <!-- Thư viện quét barcode phù hợp với iPhone/Safari -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #16181d;
      --muted: #6b7280;
      --border: #d9dde5;
      --primary: #1677ff;
      --primary-dark: #0f5fc9;
      --danger: #d93025;
      --success: #137333;
      --warning: #b45309;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;
    }

    body {
      padding:
        max(18px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
    }

    .app {
      width: min(680px, 100%);
      margin: 0 auto;
    }

    .header {
      margin: 4px 2px 18px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 7vw, 38px);
      line-height: 1.1;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 800;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }

    input {
      width: 100%;
      min-height: 54px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: var(--text);
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.15);
    }

    button {
      min-height: 54px;
      border: 0;
      border-radius: 13px;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #eef4ff;
      color: #0b57d0;
      white-space: nowrap;
    }

    .btn-print {
      width: 100%;
      min-height: 64px;
      margin-top: 18px;
      background: #111827;
      color: #ffffff;
      font-size: 20px;
    }

    .computer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .computer strong {
      font-size: 15px;
    }

    .computer small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef0f3;
      color: #5d6470;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.online {
      background: #e8f5ec;
      color: var(--success);
    }

    .badge.offline {
      background: #fdecec;
      color: var(--danger);
    }

    .status {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      min-height: 44px;
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: 11px;
      background: #f3f4f6;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9ca3af;
      flex: 0 0 auto;
      margin-top: 5px;
    }

    .status.ok .dot {
      background: var(--success);
    }

    .status.error .dot {
      background: var(--danger);
    }

    .status.wait .dot {
      background: var(--warning);
    }

    .log {
      margin: 0;
      padding: 12px;
      min-height: 110px;
      max-height: 220px;
      overflow: auto;
      border-radius: 12px;
      background: #101318;
      color: #d7f9df;
      font:
        12px/1.55 ui-monospace,
        SFMono-Regular,
        Menlo,
        monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.82);
    }

    .modal.open {
      display: grid;
    }

    .scanner {
      width: min(620px, 100%);
      background: #000000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.4);
    }

    .video-wrap {
      position: relative;
      width: 100%;
      min-height: 430px;
      background: #000000;
      overflow: hidden;
    }

    #reader {
      width: 100%;
      min-height: 430px;
      background: #000000;
    }

    #reader video {
      width: 100% !important;
      min-height: 430px !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    #reader img {
      display: none !important;
    }

    #reader__scan_region {
      width: 100% !important;
      min-height: 430px !important;
      background: #000000 !important;
    }

    #reader__dashboard {
      display: none !important;
    }

    #reader__camera_selection {
      display: none !important;
    }

    .scan-frame {
      position: absolute;
      z-index: 10;
      left: 8%;
      right: 8%;
      top: 36%;
      height: 28%;
      border: 3px solid rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.16);
      pointer-events: none;
    }

    .scan-line {
      position: absolute;
      left: 5%;
      right: 5%;
      top: 50%;
      height: 2px;
      background: #ff3b30;
      box-shadow: 0 0 10px #ff3b30;
    }

    .scanner-help {
      position: absolute;
      z-index: 11;
      left: 15px;
      right: 15px;
      bottom: 14px;
      padding: 9px 12px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.62);
      color: #ffffff;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }

    .scanner-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
      background: #111111;
    }

    .btn-close {
      background: #2b2b2b;
      color: #ffffff;
    }

    .btn-light {
      background: #ffffff;
      color: #111111;
    }

    @media (max-width: 420px) {
      .card {
        padding: 15px;
      }

      .row {
        grid-template-columns: 1fr 104px;
      }

      button {
        padding: 0 12px;
      }

      .video-wrap,
      #reader,
      #reader video,
      #reader__scan_region {
        min-height: 480px !important;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <h1>In tem hàng hóa</h1>
      <p>Quét mã và gửi lệnh in tới máy tính KiotViet.</p>
    </header>

    <section class="card computer">
      <div>
        <strong>Máy in tem T-NGON</strong>
        <small id="lastSeenText">
          Đang kiểm tra kết nối…
        </small>
      </div>

      <span id="onlineBadge" class="badge">
        Đang kiểm tra
      </span>
    </section>

    <section class="card">
      <label for="barcode">Mã vạch</label>

      <div class="row">
        <input
          id="barcode"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          enterkeyhint="done"
          placeholder="Nhập hoặc quét mã vạch"
        />

        <button
          id="scanBtn"
          class="btn-secondary"
          type="button"
        >
          📷 Quét
        </button>
      </div>

      <button
        id="printBtn"
        class="btn-print"
        type="button"
      >
        🖨️ In 1 tem
      </button>

      <div id="status" class="status">
        <span class="dot"></span>
        <span id="statusText">
          Sẵn sàng.
        </span>
      </div>

      <p class="hint">
        Quét xong sẽ tự gửi lệnh in. Máy tính sẽ tìm hàng,
        in tem, chờ 3 giây rồi xóa hàng khỏi giỏ.
      </p>
    </section>

    <section class="card">
      <label>Nhật ký</label>
      <pre id="log" class="log">Sẵn sàng.</pre>
    </section>
  </main>

  <div
    id="scannerModal"
    class="modal"
    aria-hidden="true"
  >
    <div class="scanner">
      <div class="video-wrap">
        <div id="reader"></div>

        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>

        <div class="scanner-help">
          Đưa mã vạch nằm ngang trong khung và giữ máy ổn định
        </div>
      </div>

      <div class="scanner-actions">
        <button
          id="manualBtn"
          class="btn-light"
          type="button"
        >
          Nhập thủ công
        </button>

        <button
          id="closeScannerBtn"
          class="btn-close"
          type="button"
        >
          Đóng
        </button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CONFIG = {
        databaseURL:
          "https://tngon-b37d6-default-rtdb.asia-southeast1.firebasedatabase.app",

        deviceId: "tngon_label_pc",

        token: "6868-LABEL-2026",

        commandTimeoutMs: 30000,

        onlineTimeoutMs: 15000
      };

      const basePath =
        `labelPrinter/${CONFIG.deviceId}`;

      const api = path =>
        `${CONFIG.databaseURL}/${basePath}/${path}.json`;

      const barcodeInput =
        document.getElementById("barcode");

      const scanBtn =
        document.getElementById("scanBtn");

      const printBtn =
        document.getElementById("printBtn");

      const statusBox =
        document.getElementById("status");

      const statusText =
        document.getElementById("statusText");

      const logBox =
        document.getElementById("log");

      const onlineBadge =
        document.getElementById("onlineBadge");

      const lastSeenText =
        document.getElementById("lastSeenText");

      const scannerModal =
        document.getElementById("scannerModal");

      const closeScannerBtn =
        document.getElementById("closeScannerBtn");

      const manualBtn =
        document.getElementById("manualBtn");

      let html5QrCode = null;

      let scannerRunning = false;

      let scannerOpening = false;

      let scannerClosing = false;

      let activeCommandId = null;

      let resultPollTimer = null;

      let lastScannedCode = "";

      let lastScannedAt = 0;

      const sleep = ms =>
        new Promise(resolve =>
          setTimeout(resolve, ms)
        );

      function createId() {
        if (
          window.crypto &&
          typeof crypto.randomUUID ===
            "function"
        ) {
          return crypto.randomUUID();
        }

        return (
          Date.now() +
          "-" +
          Math.random()
            .toString(16)
            .slice(2)
        );
      }

      async function firebaseRequest(
        url,
        options = {}
      ) {
        const controller =
          new AbortController();

        const timeout =
          setTimeout(() => {
            controller.abort();
          }, 10000);

        try {
          const response =
            await fetch(url, {
              cache: "no-store",

              ...options,

              headers: {
                "Content-Type":
                  "application/json",

                ...(options.headers || {})
              },

              signal: controller.signal
            });

          if (!response.ok) {
            throw new Error(
              `Firebase HTTP ${response.status}`
            );
          }

          const text =
            await response.text();

          return text
            ? JSON.parse(text)
            : null;
        } finally {
          clearTimeout(timeout);
        }
      }

      function writeLog(data) {
        const time =
          new Date().toLocaleTimeString(
            "vi-VN"
          );

        const text =
          typeof data === "string"
            ? data
            : JSON.stringify(
                data,
                null,
                2
              );

        logBox.textContent =
          `[${time}] ${text}\n\n` +
          logBox.textContent;
      }

      function setStatus(
        message,
        mode = ""
      ) {
        statusBox.className =
          `status ${mode}`.trim();

        statusText.textContent =
          message;
      }

      function setBusy(busy) {
        printBtn.disabled = busy;
        scanBtn.disabled = busy;
        barcodeInput.disabled = busy;

        printBtn.textContent = busy
          ? "⏳ Đang xử lý…"
          : "🖨️ In 1 tem";
      }

      async function checkComputerStatus() {
        try {
          const data =
            await firebaseRequest(
              api("status")
            );

          const lastSeen =
            Number(
              data?.lastSeen || 0
            );

          const online =
            data?.online === true &&
            Date.now() - lastSeen <
              CONFIG.onlineTimeoutMs;

          onlineBadge.textContent =
            online
              ? "Online"
              : "Offline";

          onlineBadge.className =
            `badge ${
              online
                ? "online"
                : "offline"
            }`;

          if (lastSeen) {
            const updatedTime =
              new Date(
                lastSeen
              ).toLocaleTimeString(
                "vi-VN"
              );

            lastSeenText.textContent =
              `${
                online
                  ? "Đang kết nối"
                  : "Mất kết nối"
              } · cập nhật ${updatedTime}`;
          } else {
            lastSeenText.textContent =
              "Chưa thấy Tampermonkey kết nối";
          }

          return online;
        } catch (error) {
          onlineBadge.textContent =
            "Lỗi mạng";

          onlineBadge.className =
            "badge offline";

          lastSeenText.textContent =
            "Không đọc được Firebase";

          return false;
        }
      }

      async function sendPrintCommand() {
        const barcode =
          barcodeInput.value.trim();

        if (!barcode) {
          setStatus(
            "Chưa có mã vạch.",
            "error"
          );

          barcodeInput.focus();
          return;
        }

        if (activeCommandId) {
          setStatus(
            "Đang có một lệnh in được xử lý.",
            "wait"
          );

          return;
        }

        setBusy(true);

        setStatus(
          "Đang kiểm tra máy tính…",
          "wait"
        );

        try {
          const online =
            await checkComputerStatus();

          if (!online) {
            throw new Error(
              "Máy tính in tem đang offline hoặc tab KiotViet chưa mở."
            );
          }

          const command = {
            id: createId(),

            type: "PRINT_LABEL",

            barcode,

            quantity: 1,

            token: CONFIG.token,

            createdAt: Date.now(),

            source: "github-phone"
          };

          activeCommandId =
            command.id;

          await firebaseRequest(
            api("command"),
            {
              method: "PUT",

              body:
                JSON.stringify(
                  command
                )
            }
          );

          writeLog({
            sent: command
          });

          setStatus(
            "Đã gửi lệnh. Máy tính đang tìm hàng…",
            "wait"
          );

          startResultPolling(
            command
          );
        } catch (error) {
          writeLog({
            error:
              error?.message ||
              String(error)
          });

          setStatus(
            error?.message ||
              String(error),
            "error"
          );

          activeCommandId = null;

          setBusy(false);
        }
      }

      function startResultPolling(
        command
      ) {
        stopResultPolling();

        const startedAt =
          Date.now();

        resultPollTimer =
          setInterval(
            async () => {
              try {
                if (
                  Date.now() -
                    startedAt >
                  CONFIG.commandTimeoutMs
                ) {
                  throw new Error(
                    "Quá 30 giây chưa nhận được kết quả từ máy tính."
                  );
                }

                const result =
                  await firebaseRequest(
                    api("result")
                  );

                if (
                  !result ||
                  result.commandId !==
                    command.id
                ) {
                  return;
                }

                if (
                  result.status ===
                  "processing"
                ) {
                  setStatus(
                    result.message ||
                      "Máy tính đang xử lý…",
                    "wait"
                  );

                  return;
                }

                stopResultPolling();

                writeLog({
                  received: result
                });

                if (
                  result.status ===
                  "success"
                ) {
                  setStatus(
                    result.message ||
                      "Đã in tem thành công.",
                    "ok"
                  );

                  barcodeInput.value =
                    "";

                  navigator.vibrate?.([
                    100,
                    60,
                    100
                  ]);
                } else {
                  setStatus(
                    result.message ||
                      "In tem thất bại.",
                    "error"
                  );

                  navigator.vibrate?.(
                    250
                  );
                }

                activeCommandId =
                  null;

                setBusy(false);

                barcodeInput.focus();
              } catch (error) {
                stopResultPolling();

                writeLog({
                  error:
                    error?.message ||
                    String(error)
                });

                setStatus(
                  error?.message ||
                    String(error),
                  "error"
                );

                activeCommandId =
                  null;

                setBusy(false);
              }
            },
            700
          );
      }

      function stopResultPolling() {
        if (resultPollTimer) {
          clearInterval(
            resultPollTimer
          );
        }

        resultPollTimer = null;
      }

      async function openScanner() {
        if (
          scannerRunning ||
          scannerOpening
        ) {
          return;
        }

        if (
          typeof Html5Qrcode ===
          "undefined"
        ) {
          setStatus(
            "Không tải được thư viện quét mã. Kiểm tra kết nối mạng.",
            "error"
          );

          return;
        }

        scannerOpening = true;

        scannerModal.classList.add(
          "open"
        );

        scannerModal.setAttribute(
          "aria-hidden",
          "false"
        );

        setStatus(
          "Đang mở camera…",
          "wait"
        );

        try {
          html5QrCode =
            new Html5Qrcode(
              "reader",
              {
                verbose: false,

                formatsToSupport: [
                  Html5QrcodeSupportedFormats
                    .EAN_13,

                  Html5QrcodeSupportedFormats
                    .EAN_8,

                  Html5QrcodeSupportedFormats
                    .UPC_A,

                  Html5QrcodeSupportedFormats
                    .UPC_E,

                  Html5QrcodeSupportedFormats
                    .CODE_128,

                  Html5QrcodeSupportedFormats
                    .CODE_39,

                  Html5QrcodeSupportedFormats
                    .ITF
                ]
              }
            );

          const screenWidth =
            Math.max(
              280,
              window.innerWidth
            );

          const qrWidth =
            Math.min(
              Math.floor(
                screenWidth * 0.78
              ),
              360
            );

          const scanConfig = {
            fps: 15,

            qrbox: {
              width: qrWidth,

              height: Math.min(
                160,
                Math.floor(
                  qrWidth * 0.45
                )
              )
            },

            aspectRatio:
              window.innerHeight >
              window.innerWidth
                ? 0.75
                : 1.333333,

            disableFlip: false,

            experimentalFeatures: {
              useBarCodeDetectorIfSupported:
                false
            },

            videoConstraints: {
              facingMode:
                "environment",

              focusMode:
                "continuous",

              width: {
                ideal: 1920
              },

              height: {
                ideal: 1080
              }
            }
          };

          await html5QrCode.start(
            {
              facingMode:
                "environment"
            },

            scanConfig,

            async decodedText => {
              const value =
                String(
                  decodedText || ""
                ).trim();

              if (!value) {
                return;
              }

              const now =
                Date.now();

              if (
                value ===
                  lastScannedCode &&
                now -
                  lastScannedAt <
                  2500
              ) {
                return;
              }

              lastScannedCode =
                value;

              lastScannedAt =
                now;

              barcodeInput.value =
                value;

              navigator.vibrate?.([
                100,
                50,
                100
              ]);

              setStatus(
                `Đã quét mã ${value}.`,
                "ok"
              );

              await closeScanner();

              await sleep(250);

              await sendPrintCommand();
            },

            () => {
              // Chưa tìm thấy mã trong khung hình.
              // Tiếp tục quét.
            }
          );

          scannerRunning = true;

          setStatus(
            "Đưa mã vạch vào giữa khung. Giữ máy ổn định.",
            "wait"
          );
        } catch (error) {
          writeLog({
            cameraError:
              error?.message ||
              String(error)
          });

          setStatus(
            "Không mở được camera. Kiểm tra quyền camera của Safari.",
            "error"
          );

          await closeScanner();
        } finally {
          scannerOpening = false;
        }
      }

      async function closeScanner() {
        if (scannerClosing) {
          return;
        }

        scannerClosing = true;

        try {
          if (
            html5QrCode &&
            scannerRunning
          ) {
            await html5QrCode.stop();
          }
        } catch (error) {
          console.warn(
            "Không dừng được camera:",
            error
          );
        }

        try {
          if (html5QrCode) {
            await html5QrCode.clear();
          }
        } catch (error) {
          console.warn(
            "Không xóa được scanner:",
            error
          );
        }

        html5QrCode = null;

        scannerRunning = false;

        scannerOpening = false;

        scannerModal.classList.remove(
          "open"
        );

        scannerModal.setAttribute(
          "aria-hidden",
          "true"
        );

        scannerClosing = false;
      }

      scanBtn.addEventListener(
        "click",
        openScanner
      );

      closeScannerBtn.addEventListener(
        "click",
        closeScanner
      );

      manualBtn.addEventListener(
        "click",
        async () => {
          await closeScanner();

          barcodeInput.focus();
        }
      );

      printBtn.addEventListener(
        "click",
        sendPrintCommand
      );

      barcodeInput.addEventListener(
        "keydown",
        event => {
          if (
            event.key ===
            "Enter"
          ) {
            event.preventDefault();

            sendPrintCommand();
          }
        }
      );

      document.addEventListener(
        "visibilitychange",
        async () => {
          if (
            document.hidden
          ) {
            await closeScanner();
          }
        }
      );

      window.addEventListener(
        "pagehide",
        () => {
          closeScanner();
        }
      );

      checkComputerStatus();

      setInterval(
        checkComputerStatus,
        4000
      );

      barcodeInput.focus();
    })();
  </script>
</body>
</html>
