<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  />

  <title>T-NGON - Điều khiển in tem</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #16181d;
      --muted: #6b7280;
      --border: #d9dde5;
      --primary: #1677ff;
      --primary-dark: #0f5fc9;
      --danger: #d93025;
      --success: #137333;
      --warning: #b45309;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;
    }

    body {
      padding:
        max(18px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
    }

    .app {
      width: min(680px, 100%);
      margin: 0 auto;
    }

    .header {
      margin: 4px 2px 18px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 7vw, 38px);
      line-height: 1.1;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 800;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }

    input {
      width: 100%;
      min-height: 54px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: var(--text);
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.15);
    }

    button {
      min-height: 54px;
      border: 0;
      border-radius: 13px;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #eef4ff;
      color: #0b57d0;
      white-space: nowrap;
    }

    .btn-print {
      width: 100%;
      min-height: 64px;
      margin-top: 18px;
      background: #111827;
      color: #ffffff;
      font-size: 20px;
    }

    .status {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      min-height: 44px;
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: 11px;
      background: #f3f4f6;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9ca3af;
      flex: 0 0 auto;
      margin-top: 5px;
    }

    .status.ok .dot {
      background: var(--success);
    }

    .status.error .dot {
      background: var(--danger);
    }

    .status.wait .dot {
      background: var(--warning);
    }

    .computer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .computer strong {
      font-size: 15px;
    }

    .computer small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef0f3;
      color: #5d6470;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.online {
      background: #e8f5ec;
      color: var(--success);
    }

    .badge.offline {
      background: #fdecec;
      color: var(--danger);
    }

    .log {
      margin: 0;
      padding: 12px;
      min-height: 110px;
      max-height: 220px;
      overflow: auto;
      border-radius: 12px;
      background: #101318;
      color: #d7f9df;
      font:
        12px/1.55 ui-monospace,
        SFMono-Regular,
        Menlo,
        monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.78);
    }

    .modal.open {
      display: grid;
    }

    .scanner {
      width: min(620px, 100%);
      background: #000000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.4);
    }

    .video-wrap {
      position: relative;
      aspect-ratio: 3 / 4;
      background: #000000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scan-frame {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 38%;
      height: 24%;
      border: 3px solid rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .scan-line {
      position: absolute;
      left: 5%;
      right: 5%;
      top: 50%;
      height: 2px;
      background: #ff3b30;
      box-shadow: 0 0 10px #ff3b30;
    }

    .scanner-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
      background: #111111;
    }

    .btn-close {
      background: #2b2b2b;
      color: #ffffff;
    }

    .btn-light {
      background: #ffffff;
      color: #111111;
    }

    @media (max-width: 420px) {
      .card {
        padding: 15px;
      }

      .row {
        grid-template-columns: 1fr 104px;
      }

      button {
        padding: 0 12px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <h1>In tem hàng hóa</h1>
      <p>Quét mã và gửi lệnh in tới máy tính KiotViet.</p>
    </header>

    <section class="card computer">
      <div>
        <strong>Máy in tem T-NGON</strong>
        <small id="lastSeenText">Đang kiểm tra kết nối…</small>
      </div>

      <span id="onlineBadge" class="badge">Đang kiểm tra</span>
    </section>

    <section class="card">
      <div>
        <label for="barcode">Mã vạch</label>

        <div class="row">
          <input
            id="barcode"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            enterkeyhint="done"
            placeholder="Nhập hoặc quét mã vạch"
          />

          <button
            id="scanBtn"
            class="btn-secondary"
            type="button"
          >
            📷 Quét
          </button>
        </div>
      </div>

      <button
        id="printBtn"
        class="btn-print"
        type="button"
      >
        🖨️ In 1 tem
      </button>

      <div id="status" class="status">
        <span class="dot"></span>
        <span id="statusText">Sẵn sàng.</span>
      </div>

      <p class="hint">
        Mỗi lần bấm chỉ gửi một lệnh. Máy tính sẽ tìm mã, in,
        chờ 3 giây rồi xóa hàng khỏi giỏ.
      </p>
    </section>

    <section class="card">
      <label>Nhật ký</label>
      <pre id="log" class="log">Sẵn sàng.</pre>
    </section>
  </main>

  <div
    id="scannerModal"
    class="modal"
    aria-hidden="true"
  >
    <div class="scanner">
      <div class="video-wrap">
        <video
          id="video"
          playsinline
          muted
        ></video>

        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>

      <div class="scanner-actions">
        <button
          id="manualBtn"
          class="btn-light"
          type="button"
        >
          Nhập thủ công
        </button>

        <button
          id="closeScannerBtn"
          class="btn-close"
          type="button"
        >
          Đóng
        </button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CONFIG = {
        databaseURL:
          "https://tngon-b37d6-default-rtdb.asia-southeast1.firebasedatabase.app",

        deviceId: "tngon_label_pc",

        token: "6868-LABEL-2026",

        commandTimeoutMs: 30000,

        onlineTimeoutMs: 15000
      };

      const basePath = `labelPrinter/${CONFIG.deviceId}`;

      const api = path =>
        `${CONFIG.databaseURL}/${basePath}/${path}.json`;

      const barcodeInput =
        document.getElementById("barcode");

      const scanBtn =
        document.getElementById("scanBtn");

      const printBtn =
        document.getElementById("printBtn");

      const status =
        document.getElementById("status");

      const statusText =
        document.getElementById("statusText");

      const logBox =
        document.getElementById("log");

      const onlineBadge =
        document.getElementById("onlineBadge");

      const lastSeenText =
        document.getElementById("lastSeenText");

      const scannerModal =
        document.getElementById("scannerModal");

      const video =
        document.getElementById("video");

      const closeScannerBtn =
        document.getElementById("closeScannerBtn");

      const manualBtn =
        document.getElementById("manualBtn");

      let mediaStream = null;
      let scanTimer = null;
      let barcodeDetector = null;
      let activeCommandId = null;
      let resultPollTimer = null;

      const sleep = ms =>
        new Promise(resolve => setTimeout(resolve, ms));

      const createId = () => {
        if (crypto.randomUUID) {
          return crypto.randomUUID();
        }

        return `${Date.now()}-${Math.random()
          .toString(16)
          .slice(2)}`;
      };

      async function firebaseRequest(
        url,
        options = {}
      ) {
        const controller =
          new AbortController();

        const timeout = setTimeout(() => {
          controller.abort();
        }, 10000);

        try {
          const response = await fetch(url, {
            cache: "no-store",
            ...options,

            headers: {
              "Content-Type": "application/json",
              ...(options.headers || {})
            },

            signal: controller.signal
          });

          if (!response.ok) {
            throw new Error(
              `Firebase HTTP ${response.status}`
            );
          }

          const text = await response.text();

          return text
            ? JSON.parse(text)
            : null;
        } finally {
          clearTimeout(timeout);
        }
      }

      function writeLog(data) {
        const time =
          new Date().toLocaleTimeString("vi-VN");

        const text =
          typeof data === "string"
            ? data
            : JSON.stringify(data, null, 2);

        logBox.textContent =
          `[${time}] ${text}\n\n` +
          logBox.textContent;
      }

      function setStatus(
        message,
        mode = ""
      ) {
        status.className =
          `status ${mode}`.trim();

        statusText.textContent =
          message;
      }

      function setBusy(busy) {
        printBtn.disabled = busy;
        scanBtn.disabled = busy;
        barcodeInput.disabled = busy;

        printBtn.textContent = busy
          ? "⏳ Đang xử lý…"
          : "🖨️ In 1 tem";
      }

      async function checkComputerStatus() {
        try {
          const data =
            await firebaseRequest(api("status"));

          const lastSeen =
            Number(data?.lastSeen || 0);

          const online =
            data?.online === true &&
            Date.now() - lastSeen <
              CONFIG.onlineTimeoutMs;

          onlineBadge.textContent =
            online
              ? "Online"
              : "Offline";

          onlineBadge.className =
            `badge ${
              online
                ? "online"
                : "offline"
            }`;

          if (lastSeen) {
            const updatedTime =
              new Date(
                lastSeen
              ).toLocaleTimeString("vi-VN");

            lastSeenText.textContent =
              `${
                online
                  ? "Đang kết nối"
                  : "Mất kết nối"
              } · cập nhật ${updatedTime}`;
          } else {
            lastSeenText.textContent =
              "Chưa thấy Tampermonkey kết nối";
          }

          return online;
        } catch (error) {
          onlineBadge.textContent =
            "Lỗi mạng";

          onlineBadge.className =
            "badge offline";

          lastSeenText.textContent =
            "Không đọc được Firebase";

          return false;
        }
      }

      async function sendPrintCommand() {
        const barcode =
          barcodeInput.value.trim();

        if (!barcode) {
          setStatus(
            "Chưa có mã vạch.",
            "error"
          );

          barcodeInput.focus();
          return;
        }

        if (activeCommandId) {
          return;
        }

        setBusy(true);

        setStatus(
          "Đang kiểm tra máy tính…",
          "wait"
        );

        try {
          const online =
            await checkComputerStatus();

          if (!online) {
            throw new Error(
              "Máy tính in tem đang offline hoặc tab KiotViet chưa mở."
            );
          }

          const command = {
            id: createId(),

            type: "PRINT_LABEL",

            barcode,

            quantity: 1,

            token: CONFIG.token,

            createdAt: Date.now(),

            source: "github-phone"
          };

          activeCommandId =
            command.id;

          await firebaseRequest(
            api("command"),
            {
              method: "PUT",
              body: JSON.stringify(command)
            }
          );

          writeLog({
            sent: command
          });

          setStatus(
            "Đã gửi lệnh. Máy tính đang tìm hàng…",
            "wait"
          );

          startResultPolling(command);
        } catch (error) {
          writeLog({
            error: String(error)
          });

          setStatus(
            error.message || String(error),
            "error"
          );

          activeCommandId = null;

          setBusy(false);
        }
      }

      function startResultPolling(command) {
        stopResultPolling();

        const startedAt =
          Date.now();

        resultPollTimer =
          setInterval(async () => {
            try {
              if (
                Date.now() - startedAt >
                CONFIG.commandTimeoutMs
              ) {
                throw new Error(
                  "Quá 30 giây chưa nhận được kết quả từ máy tính."
                );
              }

              const result =
                await firebaseRequest(
                  api("result")
                );

              if (
                !result ||
                result.commandId !==
                  command.id
              ) {
                return;
              }

              if (
                result.status ===
                "processing"
              ) {
                setStatus(
                  result.message ||
                    "Máy tính đang xử lý…",
                  "wait"
                );

                return;
              }

              stopResultPolling();

              writeLog({
                received: result
              });

              if (
                result.status ===
                "success"
              ) {
                setStatus(
                  result.message ||
                    "Đã in tem thành công.",
                  "ok"
                );

                barcodeInput.value = "";

                navigator.vibrate?.([
                  100,
                  60,
                  100
                ]);
              } else {
                setStatus(
                  result.message ||
                    "In tem thất bại.",
                  "error"
                );

                navigator.vibrate?.(250);
              }

              activeCommandId = null;

              setBusy(false);

              barcodeInput.focus();
            } catch (error) {
              stopResultPolling();

              writeLog({
                error: String(error)
              });

              setStatus(
                error.message ||
                  String(error),
                "error"
              );

              activeCommandId = null;

              setBusy(false);
            }
          }, 700);
      }

      function stopResultPolling() {
        if (resultPollTimer) {
          clearInterval(
            resultPollTimer
          );
        }

        resultPollTimer = null;
      }

      async function openScanner() {
        if (
          !navigator.mediaDevices
            ?.getUserMedia
        ) {
          setStatus(
            "Trình duyệt không cho dùng camera.",
            "error"
          );

          return;
        }

        scannerModal.classList.add(
          "open"
        );

        scannerModal.setAttribute(
          "aria-hidden",
          "false"
        );

        try {
          mediaStream =
            await navigator.mediaDevices.getUserMedia(
              {
                video: {
                  facingMode: {
                    ideal: "environment"
                  },

                  width: {
                    ideal: 1280
                  },

                  height: {
                    ideal: 720
                  }
                },

                audio: false
              }
            );

          video.srcObject =
            mediaStream;

          await video.play();

          if (
            "BarcodeDetector" in window
          ) {
            barcodeDetector =
              new BarcodeDetector({
                formats: [
                  "ean_13",
                  "ean_8",
                  "code_128",
                  "code_39",
                  "upc_a",
                  "upc_e",
                  "itf",
                  "qr_code"
                ]
              });

            startDetecting();

            setStatus(
              "Đang quét mã bằng camera…",
              "wait"
            );
          } else {
            setStatus(
              "Trình duyệt này chưa hỗ trợ tự nhận mã. Hãy nhập thủ công.",
              "error"
            );
          }
        } catch (error) {
          writeLog({
            cameraError: String(error)
          });

          setStatus(
            "Không mở được camera. Kiểm tra quyền camera và HTTPS.",
            "error"
          );

          closeScanner();
        }
      }

      function startDetecting() {
        stopDetecting();

        scanTimer =
          setInterval(async () => {
            if (
              !barcodeDetector ||
              video.readyState < 2
            ) {
              return;
            }

            try {
              const codes =
                await barcodeDetector.detect(
                  video
                );

              const value =
                codes?.[0]?.rawValue?.trim();

              if (!value) {
                return;
              }

              barcodeInput.value =
                value;

              navigator.vibrate?.(120);

              closeScanner();

              await sleep(150);

              sendPrintCommand();
            } catch (error) {
              // Bỏ qua lỗi từng khung hình.
            }
          }, 350);
      }

      function stopDetecting() {
        if (scanTimer) {
          clearInterval(scanTimer);
        }

        scanTimer = null;
      }

      function closeScanner() {
        stopDetecting();

        if (mediaStream) {
          mediaStream
            .getTracks()
            .forEach(track =>
              track.stop()
            );
        }

        mediaStream = null;

        video.srcObject = null;

        scannerModal.classList.remove(
          "open"
        );

        scannerModal.setAttribute(
          "aria-hidden",
          "true"
        );
      }

      scanBtn.addEventListener(
        "click",
        openScanner
      );

      closeScannerBtn.addEventListener(
        "click",
        closeScanner
      );

      manualBtn.addEventListener(
        "click",
        () => {
          closeScanner();
          barcodeInput.focus();
        }
      );

      printBtn.addEventListener(
        "click",
        sendPrintCommand
      );

      barcodeInput.addEventListener(
        "keydown",
        event => {
          if (event.key === "Enter") {
            sendPrintCommand();
          }
        }
      );

      document.addEventListener(
        "visibilitychange",
        () => {
          if (document.hidden) {
            closeScanner();
          }
        }
      );

      checkComputerStatus();

      setInterval(
        checkComputerStatus,
        4000
      );

      barcodeInput.focus();
    })();
  </script>
</body>
</html>
